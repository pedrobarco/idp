name: Build and Push

on:
  workflow_call:
    inputs:
      registry:
        description: "Registry host"
        type: string
        default: "kind-registry:5000"
      repository:
        description: "Image repository name"
        type: string
        required: true
      tag:
        description: "Image tag"
        type: string
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and push
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "${TAG}" ]; then
            TAG=$(echo "${{ gitea.sha }}" | cut -c1-7)
          fi
          IMAGE="${{ inputs.registry }}/${{ inputs.repository }}:${TAG}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
