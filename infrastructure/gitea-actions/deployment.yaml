apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-actions-runner
  labels:
    app: gitea-actions-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-actions-runner
  template:
    metadata:
      labels:
        app: gitea-actions-runner
    spec:
      containers:
        # Docker-in-Docker daemon
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: docker-certs
              mountPath: /certs

        # Gitea Actions runner
        - name: runner
          image: gitea/act_runner:latest
          command:
            - sh
            - -c
            - |
              while ! docker info >/dev/null 2>&1; do
                echo "Waiting for Docker daemon..."
                sleep 2
              done
              # Register if not already registered
              if [ ! -f /data/.runner ]; then
                act_runner register --no-interactive \
                  --instance "${GITEA_INSTANCE_URL}" \
                  --token "${RUNNER_REGISTRATION_TOKEN}" \
                  --name "runner-0" \
                  --config /config/config.yaml
              fi
              act_runner daemon --config /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: GITEA_INSTANCE_URL
              value: http://gitea-http.gitea.svc.cluster.local:3000
            - name: RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-actions-runner-token
                  key: token
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
              readOnly: true
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config

      volumes:
        - name: docker-certs
          emptyDir: {}
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: gitea-actions-runner-config
