apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "9.5.0"
    releaseName: argocd
    namespace: argocd
    includeCRDs: true
    valuesInline:
      global:
        domain: argocd.idp.localhost
      configs:
        params:
          server.insecure: true
        # Credentials must match infrastructure/gitea admin config.
        repositories:
          idp:
            url: http://gitea-http.gitea.svc.cluster.local:3000/admin/idp.git
            type: git
            name: idp
            username: admin
            password: admin
      server:
        ingress:
          enabled: true
          ingressClassName: nginx
