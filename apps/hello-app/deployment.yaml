apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  labels:
    app.kubernetes.io/name: hello-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-app
    spec:
      containers:
        - name: hello-app
          image: localhost:5001/hello-app:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HELLO_MESSAGE
              value: "Hello, World!"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5

