# Bootstrap for the dev (hub) cluster.
# Installs: ArgoCD, Gitea, registry ConfigMap, cluster secrets.
# ingress-nginx is managed via ArgoCD ApplicationSet.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../infrastructure/argocd
  - ../../infrastructure/gitea
  - ../../infrastructure/registry
  - cluster-secrets/
