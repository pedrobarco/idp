# Bootstrap for the dev (hub) cluster.
# Installs: ArgoCD, Gitea, cluster secrets.
# Registry, ingress-nginx, kargo, etc. are managed via ArgoCD ApplicationSets.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../infrastructure/argocd
  - ../../infrastructure/gitea
  - cluster-secrets/
