apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../infrastructure/argo-rollouts

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: "2.40.9"
    releaseName: argo-rollouts
    namespace: argo-rollouts
    includeCRDs: true
    valuesFile: values.yaml
