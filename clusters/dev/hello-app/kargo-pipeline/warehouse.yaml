apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: hello-app
  namespace: hello-app
spec:
  freightCreationPolicy: Automatic
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: registry-tls-proxy.registry.svc.cluster.local/hello-app
        insecureSkipTLSVerify: true
        imageSelectionStrategy: NewestBuild
        discoveryLimit: 5
        strictSemvers: true
