apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: hello-app
  namespace: hello-app
spec:
  freightCreationPolicy: Automatic
  interval: 30s
  subscriptions:
    - image:
        repoURL: registry-tls-proxy.registry.svc.cluster.local/hello-app
        insecureSkipTLSVerify: true
        imageSelectionStrategy: NewestBuild
        discoveryLimit: 20
        strictSemvers: false
        allowTags: "^[0-9a-f]{7}$"
